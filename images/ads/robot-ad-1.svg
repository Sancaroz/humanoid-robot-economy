<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Humanoid Expo Banner</title>
  <desc id="desc">Ad banner for humanoid robotics expo</desc>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="32" fill="url(#g1)"/>
  <circle cx="180" cy="180" r="84" fill="#60a5fa" opacity="0.35"/>
  <rect x="900" y="70" width="180" height="220" rx="26" fill="#93c5fd" opacity="0.35"/>
  <text x="90" y="140" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#f8fafc">HUMANOID EXPO 2026</text>
  <text x="90" y="200" font-family="Arial, sans-serif" font-size="32" fill="#dbeafe">Smart Robotics Showcase</text>
